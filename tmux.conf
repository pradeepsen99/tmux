# ==========================================
# TERMINAL SETTINGS
# ==========================================

# Enable RGB colour if running in xterm(1)
set-option -sa terminal-overrides ",xterm*:Tc"

# Change the default $TERM to tmux-256color
set -g default-terminal "tmux-256color"

# No bells at all
set -g bell-action none

# ==========================================
# KEY BINDINGS
# ==========================================

# Change the prefix key to C-a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Set new panes to open in current directory
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Open lazygit in a floating popup window
bind g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "lazygit"
bind h display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "tas --pick"

# ==========================================
# MOUSE SETTINGS
# ==========================================

# Turn the mouse on, but without copy mode dragging
set -g mouse on
unbind -n MouseDrag1Pane
unbind -Tcopy-mode MouseDrag1Pane

# ==========================================
# STATUS BAR CONFIGURATION
# ==========================================

# Set status bar on top
set -g status-position top

# Basic status line tweaks
set -g status-style "fg=colour250,bg=colour236"
set -g status-left-length 80
set -g status-right-length 80
set -g status-left "#[fg=colour16,bg=colour46,bold]  #(git -C #{q:pane_current_path} branch --show-current 2>/dev/null)  #[fg=colour46,bg=colour236,nobold]"
set -g status-right "#[fg=colour45,bg=colour236]#[fg=colour16,bg=colour45,bold] 󰥔 %a %H:%M "

# Powerline-style window tabs. Requires a font with Powerline glyphs.
set -g status-justify absolute-centre
set -g window-status-separator ""
set -g window-status-style "fg=colour250,bg=colour236"
set -g window-status-format "#[fg=colour238,bg=colour236]#[fg=colour250,bg=colour238] #I:#W#{?window_flags, #F,} #[fg=colour238,bg=colour236]"
set -g window-status-current-style "fg=colour16,bg=colour236,bold"
set -g window-status-current-format "#[fg=colour33,bg=colour236]#[fg=colour16,bg=colour33,bold] #I:#W#{?window_flags, #F,} #[fg=colour33,bg=colour236]"
